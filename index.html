function scalaPerPersone(piano,np,nd){
  const f=np,g=nd/7;
  const pasti=piano.piano_pasti.slice(0,nd);
  const lista=piano.lista_spesa.map(cat=>({...cat,prodotti:cat.prodotti.map(p=>({...p,prezzo_stimato:(parseFloat(p.prezzo_stimato)*f*g).toFixed(2)}))}));
  const tot=lista.reduce((a,c)=>a+c.prodotti.reduce((b,p)=>b+parseFloat(p.prezzo_stimato),0),0).toFixed(2);
  return{...piano,piano_pasti:pasti,lista_spesa:lista,totale_stimato:tot};
}

      <div style="display:flex;align-items:flex-start;padding:5px 0;border-bottom:1px solid #DDE8F5;gap:8px">
        <div style="width:11px;height:11px;border:1.5px solid #00A0E2;border-radius:2px;flex-shrink:0;margin-top:2px"></div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:10px">${p.nome}${p.rtc?' [RTC]':''}${p.bonus?' [BONUS]':''}</div>
          <div style="font-size:9px;color:#6B7280">${p.quantita}${p.note?' · '+p.note:''}</div>
        </div>
        <div style="font-weight:700;color:#2D8C4E;font-size:10px">€${p.prezzo_stimato}</div>
      </div>`).join('')}`).join('');
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;font-family:Arial,sans-serif;width:190mm;padding:15px;background:white';
  div.innerHTML=`
    <div style="background:#003882;color:white;padding:12px;margin-bottom:12px;border-radius:4px">
      <div style="font-size:14px;font-weight:700">Lista della Spesa - Albert Heijn</div>
      <div style="font-size:9px;margin-top:3px">${goal} · ${people} persona${people>1?'e':''} · ${days} giorni · Air Fryer Ready-to-Cook</div>
    </div>
    ${righe}
    <div style="background:#003882;color:white;padding:10px;display:flex;justify-content:space-between;margin-top:12px;border-radius:4px">
      <span style="font-size:10px">Totale · ${days} giorni · ${people} persona${people>1?'e':''}</span>
      <span style="font-size:15px;font-weight:900">€${result.totale_stimato}</span>

  const giorni=result.piano_pasti.map(g=>`
    <div style="margin-bottom:7px;border:1px solid #E8F0F8;border-radius:4px;overflow:hidden;page-break-inside:avoid">
      <div style="background:#003882;color:white;padding:5px 8px;font-size:10px;font-weight:700">${g.giorno}</div>
      <div style="display:flex">
        <div style="flex:1;padding:7px 8px;background:#F0F7FF;border-right:1px solid #E8F0F8">
          <div style="font-size:8px;font-weight:700;color:#00A0E2;margin-bottom:2px">PRANZO</div>
          <div style="font-size:9px;font-weight:600;line-height:1.3;margin-bottom:2px">${g.pranzo.proteina}</div>
          <div style="font-size:8px;color:#374151;margin-bottom:3px">${g.pranzo.contorno}</div>
          <div style="font-size:8px"><span style="color:#00A0E2">P: ${g.pranzo.tempP}</span> / <span style="color:#2D8C4E">C: ${g.pranzo.tempC}</span></div>
          ${g.pranzo.note?`<div style="font-size:7px;color:#F97316;margin-top:2px">${g.pranzo.note}</div>`:''}
        </div>
        <div style="flex:1;padding:7px 8px;background:#E8F0F8">
          <div style="font-size:8px;font-weight:700;color:#00A0E2;margin-bottom:2px">CENA</div>
          <div style="font-size:9px;font-weight:600;line-height:1.3;margin-bottom:2px">${g.cena.proteina}</div>
          <div style="font-size:8px;color:#374151;margin-bottom:3px">${g.cena.contorno}</div>
          <div style="font-size:8px"><span style="color:#00A0E2">P: ${g.cena.tempP}</span> / <span style="color:#2D8C4E">C: ${g.cena.tempC}</span></div>
          ${g.cena.note?`<div style="font-size:7px;color:#F97316;margin-top:2px">${g.cena.note}</div>`:''}
        </div>
      </div>
    </div>`).join('');
  const ni=result.info_nutrizionali;
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;font-family:Arial,sans-serif;width:190mm;padding:15px;background:white';
  div.innerHTML=`
    <div style="background:#00A0E2;color:white;padding:12px;margin-bottom:10px;border-radius:4px">
      <div style="font-size:14px;font-weight:700">Piano Pasti Air Fryer - Albert Heijn</div>
      <div style="font-size:9px;margin-top:3px">${goal} · ${people} persona${people>1?'e':''} · ${days} giorni · Doppio cestello</div>
      <div style="font-size:8px;margin-top:2px">Preriscalda 3 min 200C · P=Proteina · C=Contorno</div>
    </div>
    ${giorni}
    <div style="background:#E8F0F8;padding:8px;border-radius:4px;margin-top:8px;font-size:8px">
      <b>Profilo nutrizionale:</b> ${ni.calorie_giornaliere_stimate} kcal · Proteine: ${ni.proteine} · Carboidrati: ${ni.carboidrati} · Grassi: ${ni.grassi}
    </div>
    <div style="background:#F0F7FF;color:#003882;font-size:8px;padding:8px;margin-top:6px;border-radius:4px">${result.consigli}</div>`;
  document.body.appendChild(div);
  html2pdf().set({margin:8,filename:'AH_Piano_Pasti_AirFryer.pdf',html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}})
    .from(div).save().then(()=>document.body.removeChild(div));
}

function App(){
  const [goal,setGoal]=useState("");
  const [people,setPeople]=useState("1");
  const [days,setDays]=useState("7");
  const [note,setNote]=useState("");
  const [result,setResult]=useState(null);
  const S={
    card:{background:WHITE,borderRadius:"16px",padding:"20px",boxShadow:"0 2px 12px rgba(0,56,130,0.08)",marginBottom:"16px"},
    chip:(on)=>({padding:"6px 13px",borderRadius:"20px",fontSize:"13px",fontWeight:"600",cursor:"pointer",
      border:`2px solid ${on?AH_BLUE:LIGHT_GRAY}`,background:on?AH_BLUE:WHITE,color:on?WHITE:GRAY,transition:"all 0.15s",margin:"3px"}),
    btn:{width:"100%",padding:"13px",background:`linear-gradient(135deg,${AH_BLUE},${AH_DARK})`,color:WHITE,
      border:"none",borderRadius:"12px",fontSize:"14px",fontWeight:"700",cursor:"pointer"},
    btnPDF:(c)=>({flex:1,padding:"11px",background:c,color:WHITE,border:"none",borderRadius:"10px",
      fontSize:"12px",fontWeight:"700",cursor:"pointer"}),
    afCard:{borderRadius:"12px",marginBottom:"9px",overflow:"hidden",border:`1px solid ${LIGHT_GRAY}`},
    afDayBar:{background:AH_DARK,color:WHITE,padding:"7px 13px",fontSize:"12px",fontWeight:"700"},
    afHalf:(b)=>({flex:1,padding:"11px 13px",background:b?LIGHT2:LIGHT_GRAY,borderRight:b?`1px solid ${LIGHT_GRAY}`:"none"}),
    catLabel:{fontSize:"10px",fontWeight:"700",color:AH_BLUE,textTransform:"uppercase",letterSpacing:"0.8px",
      marginBottom:"6px",paddingBottom:"3px",borderBottom:`2px solid ${LIGHT_GRAY}`},
    itemRow:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 0",
      borderBottom:`1px solid ${LIGHT_GRAY}`,gap:"8px"},
    totalBar:{background:AH_DARK,borderRadius:"12px",padding:"13px 16px",display:"flex",
      justifyContent:"space-between",alignItems:"center",color:WHITE,marginTop:"8px"},
  };
  const nc=(l="")=>{l=l.toLowerCase();return l.includes("alta")?GREEN:l.includes("bassa")||l.includes("molto")?AH_BLUE:ORANGE;};
  const gen=()=>{const b=PIANI[goal]||PIANI["Alta proteina"];setResult(scalaPerPersone(b,parseInt(people),parseInt(days)));};
  return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"'Inter','Segoe UI',sans-serif",color:"#1A1A2E"}}>
      <div style={{background:`linear-gradient(135deg,${AH_DARK},${AH_BLUE})`,padding:"24px 20px 20px",color:WHITE}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
          <div style={{background:WHITE,color:AH_BLUE,fontWeight:"900",fontSize:"18px",padding:"4px 10px",borderRadius:"6px"}}>ah</div>
          <span style={{fontSize:"12px",opacity:0.8,textTransform:"uppercase",letterSpacing:"0.5px"}}>Shopping Assistant</span>
        </div>
        <div style={{fontSize:"20px",fontWeight:"700"}}>Lista della spesa intelligente</div>
        <div style={{display:"flex",gap:"8px",marginTop:"8px",flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,0.18)",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"600"}}>🌬️ Air Fryer · doppio cestello</span>
          <span style={{background:"rgba(255,255,255,0.13)",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"600"}}>✂️ Ready-to-cook</span>
        </div>
      </div>
      <div style={{maxWidth:"700px",margin:"0 auto",padding:"20px 14px 40px"}}>
        <div style={S.card}>
          <div style={{fontSize:"11px",fontWeight:"700",color:AH_DARK,marginBottom:"8px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Obiettivo alimentare</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
            {GOALS.map(g=><div key={g} style={S.chip(goal===g)} onClick={()=>{setGoal(goal===g?"":g);setResult(null);}}>{g}</div>)}
          </div>
          <div style={{marginTop:"14px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:AH_DARK,marginBottom:"7px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Note (allergie, preferenze)</div>
            <textarea style={{width:"100%",padding:"11px 13px",borderRadius:"10px",border:`2px solid ${LIGHT_GRAY}`,fontSize:"13px",background:BG,boxSizing:"border-box",resize:"vertical",minHeight:"70px",fontFamily:"inherit",outline:"none"}}
              placeholder="Es: no latticini, no glutine..." value={note} onChange={e=>setNote(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:"14px",marginTop:"14px"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:AH_DARK,marginBottom:"7px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Persone</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {PEOPLE.map(p=><div key={p} style={S.chip(people===p)} onClick={()=>{setPeople(p);setResult(null);}}>{p} pers.</div>)}
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:AH_DARK,marginBottom:"7px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Giorni</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                {DAYS_OPT.map(d=><div key={d} style={S.chip(days===d)} onClick={()=>{setDays(d);setResult(null);}}>{d} giorni</div>)}
              </div>
            </div>
          </div>
          <div style={{marginTop:"14px"}}>
            <button style={{...S.btn,...(!goal?{opacity:0.5,cursor:"not-allowed"}:{})}} onClick={gen} disabled={!goal}>
              Genera piano e lista della spesa →
            </button>
          </div>
          <div style={{fontSize:"10px",color:AH_BLUE,marginTop:"10px",padding:"7px 11px",background:LIGHT2,borderRadius:"8px"}}>
            ✂️ Solo prodotti freschi già porzionati — niente coltello, niente tagliere.
          </div>
        </div>

        {result&&(<>
          <div style={S.card}>
            <div style={{fontSize:"15px",fontWeight:"700",color:AH_DARK,marginBottom:"12px"}}>📄 Scarica PDF</div>
            <div style={{display:"flex",gap:"10px"}}>
              <button style={S.btnPDF(AH_DARK)} onClick={()=>scaricaPDFLista(result,goal,parseInt(people),parseInt(days))}>🛒 Lista della Spesa PDF</button>
              <button style={S.btnPDF(AH_BLUE)} onClick={()=>scaricaPDFPiani(result,goal,parseInt(people),parseInt(days))}>🌬️ Piano Pasti PDF</button>
            </div>
          </div>

          <div style={S.card}>
            <div style={{fontSize:"15px",fontWeight:"700",color:AH_DARK,marginBottom:"12px"}}>🌬️ Piano Pasti · {days} giorni</div>
            {result.piano_pasti.map((g,i)=>(
              <div key={i} style={S.afCard}>
                <div style={S.afDayBar}>{g.giorno}</div>
                <div style={{display:"flex"}}>
                  {["pranzo","cena"].map((tipo,ti)=>(
                    <div key={tipo} style={S.afHalf(ti===0)}>
                      <div style={{fontSize:"10px",fontWeight:"700",color:AH_BLUE,textTransform:"uppercase",marginBottom:"3px"}}>{tipo==="pranzo"?"🌞 Pranzo":"🌙 Cena"}</div>
                      <div style={{fontSize:"11px",fontWeight:"600",color:"#1A1A2E",marginBottom:"2px"}}>🔖 {g[tipo].proteina}</div>
                      <div style={{fontSize:"11px",color:"#374151",marginBottom:"5px"}}>🌿 {g[tipo].contorno}</div>
                      <div style={{fontSize:"10px",color:GRAY,lineHeight:1.6}}>
                        <span style={{color:AH_BLUE}}>⏱ P: {g[tipo].tempP}</span><br/>
                        <span style={{color:GREEN}}>⏱ C: {g[tipo].tempC}</span>
                      </div>
                      {g[tipo].note&&<div style={{fontSize:"10px",color:ORANGE,fontStyle:"italic",marginTop:"3px"}}>→ {g[tipo].note}</div>}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <div style={S.card}>
            <div style={{fontSize:"15px",fontWeight:"700",color:AH_DARK,marginBottom:"12px"}}>🛒 Lista della spesa · Albert Heijn</div>
            {result.lista_spesa.map((cat,i)=>(
              <div key={i} style={{marginBottom:"16px"}}>
                <div style={S.catLabel}>{cat.categoria}</div>
                {cat.prodotti.map((p,j)=>(
                  <div key={j} style={S.itemRow}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:"600",fontSize:"13px",color:"#1A1A2E"}}>
                        {p.nome}
                        {p.bonus&&<span style={{background:ORANGE,color:WHITE,fontSize:"8px",fontWeight:"700",padding:"1px 5px",borderRadius:"6px",marginLeft:"4px"}}>BONUS</span>}
                        {p.rtc&&<span style={{background:AH_BLUE+"22",color:AH_BLUE,fontSize:"8px",fontWeight:"700",padding:"1px 5px",borderRadius:"6px",marginLeft:"4px"}}>✂️ RTC</span>}
                      </div>
                      <div style={{fontSize:"11px",color:GRAY,marginTop:"1px"}}>{p.quantita}{p.note?` · ${p.note}`:""}</div>
                    </div>
                    <div style={{fontWeight:"700",color:GREEN,fontSize:"13px",whiteSpace:"nowrap"}}>€{p.prezzo_stimato}</div>
                  </div>
                ))}
              </div>
            ))}
            <div style={S.totalBar}>
              <div style={{fontSize:"12px",opacity:0.8}}>Totale · {days} giorni · {people} persona{people==="1"?"":"e"}</div>
              <div style={{fontSize:"20px",fontWeight:"900"}}>€{result.totale_stimato}</div>
            </div>
          </div>

          {result.info_nutrizionali&&(
            <div style={S.card}>
              <div style={{fontSize:"15px",fontWeight:"700",color:AH_DARK,marginBottom:"10px"}}>🥗 Profilo nutrizionale</div>
              <div style={{fontSize:"12px",color:GRAY,marginBottom:"6px"}}>Calorie: <strong style={{color:AH_DARK}}>{result.info_nutrizionali.calorie_giornaliere_stimate} kcal/giorno</strong></div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {[["Proteine",result.info_nutrizionali.proteine],["Carboidrati",result.info_nutrizionali.carboidrati],["Grassi",result.info_nutrizionali.grassi]].map(([k,v])=>(
                  <div key={k} style={{background:nc(v)+"22",color:nc(v),borderRadius:"8px",padding:"3px 9px",fontSize:"10px",fontWeight:"700"}}>{k}: {v}</div>
                ))}
              </div>
              {result.consigli&&<div style={{marginTop:"12px",padding:"11px 13px",background:LIGHT_GRAY,borderRadius:"10px",fontSize:"12px",color:AH_DARK,lineHeight:1.6}}>💡 {result.consigli}</div>}
            </div>
          )}
        </>)}
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
