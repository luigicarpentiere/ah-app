function scalaPerPersone(piano,np,nd){
  const f=np,g=nd/7;
  const pasti=piano.piano_pasti.slice(0,nd);
  const lista=piano.lista_spesa.map(cat=>({...cat,prodotti:cat.prodotti.map(p=>({...p,prezzo_stimato:(parseFloat(p.prezzo_stimato)*f*g).toFixed(2)}))}));
  const tot=lista.reduce((a,c)=>a+c.prodotti.reduce((b,p)=>b+parseFloat(p.prezzo_stimato),0),0).toFixed(2);
  return{...piano,piano_pasti:pasti,lista_spesa:lista,totale_stimato:tot};
}

// ── COMPONENTE APP ────────────────────────────────────────────────────────────

    const base=PIANI[goal]||PIANI["Alta proteina"];

    l=l.toLowerCase();
    if(l.includes("alta")||l.includes("high"))return GREEN;

              <label style={S.label}>Persone</label>

              <label style={S.label}>Giorni</label>

              <div style={S.sectionTitle}>📄 Scarica PDF</div>
              <div style={S.pdfRow}>
                <button style={S.btnPDF(AH_DARK)}
                  onClick={()=>apriStampaLista(result,goal,parseInt(people),parseInt(days))}>
                  🛒 PDF Lista della Spesa
                </button>
                <button style={S.btnPDF(AH_BLUE)}
                  onClick={()=>apriStampaPiani(result,goal,parseInt(people),parseInt(days))}>
                  🌬️ PDF Piano Pasti AF

              <div style={{fontSize:"10px",color:GRAY,marginTop:"8px"}}>

                <div style={S.nutriRow}>
                  <div style={S.nutriChip(nc(result.info_nutrizionali.proteine))}>Proteine: {result.info_nutrizionali.proteine}</div>
                  <div style={S.nutriChip(nc(result.info_nutrizionali.carboidrati))}>Carboidrati: {result.info_nutrizionali.carboidrati}</div>
                  <div style={S.nutriChip(nc(result.info_nutrizionali.grassi))}>Grassi: {result.info_nutrizionali.grassi}</div>
                </div>
                {result.consigli&&<div style={S.consiglio}>💡 {result.consigli}</div>}

    </div>
  );
}

</script>
